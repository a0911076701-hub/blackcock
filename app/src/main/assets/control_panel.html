<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Devil C2</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }
        body { background:#0a0a0a; color:#e0e0e0; padding:20px; }
        h1 { color:#ff1744; text-align:center; margin-bottom:20px; }
        .card { background:#1a1a1a; border:1px solid #333; border-radius:12px; padding:15px; margin:10px 0; cursor:pointer; }
        .card:active { background:#2a0a0a; border-color:#ff1744; }
        .device-name { font-size:18px; font-weight:bold; }
        .device-info { color:#888; font-size:14px; }
        .status { color:#4caf50; }
    </style>
</head>
<body>
    <h1>💀 BLACK DEVIL C2</h1>
    <div id="devices">⏳ جاري تحميل الأجهزة...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDummyKeyReplaceMe",
            authDomain: "your-project.firebaseapp.com",
            databaseURL: "https://your-project-default-rtdb.firebaseio.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function loadDevices() {
            const container = document.getElementById('devices');
            db.ref('devices').once('value').then(snap => {
                container.innerHTML = '';
                if (!snap.exists()) {
                    container.innerHTML = '❌ لا توجد أجهزة مسجلة';
                    return;
                }
                snap.forEach(child => {
                    const id = child.key;
                    let data = child.val();
                    try { data = JSON.parse(data); } catch(e) {}
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="device-name">📱 ${data.device_name || 'جهاز'}</div>
                        <div class="device-info">🤖 ${data.android_version || 'N/A'} | 🔋 ${data.battery || 0}%</div>
                        <div class="status">🟢 ${data.status || 'online'}</div>
                        <div style="font-size:12px;color:#666;">ID: ${id}</div>
                    `;
                    card.onclick = () => alert(`✅ تم اختيار: ${data.device_name}\nID: ${id}`);
                    container.appendChild(card);
                });
            }).catch(err => {
                container.innerHTML = `❌ خطأ: ${err.message}`;
            });
        }

        loadDevices();
        setInterval(loadDevices, 10000);
    </script>
</body>
</html>
