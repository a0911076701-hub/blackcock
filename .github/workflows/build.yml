name: Build and Sign APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Create Keystore
        run: |
          keytool -genkey -v -keystore keystore.jks -alias blackphone \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass 123456 -keypass 123456 \
            -dname "CN=BlackPhone, OU=Dev, O=Black, L=City, S=State, C=US"

      - name: Sign APK with apksigner
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks keystore.jks --ks-pass pass:123456 --key-pass pass:123456 \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Verify Signature
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify \
            app/build/outputs/apk/release/app-release-signed.apk

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: BlackControl-Signed-APK
          path: app/build/outputs/apk/release/app-release-signed.apk
